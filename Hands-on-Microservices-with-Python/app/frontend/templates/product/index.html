{% extends "base_col_1.html" %}
{% from "macros/_macros_form.html" import render_field %}
{% block title %}Product page{% endblock %}

{% block pageContent %}

    <div class="col-md-12">
        <p>this is product page</p>
        <div class="panel panel-default">
            <div class="panel-heading">
                <h2 class="panel-title">{{product.Title}}</h2>
            </div>
            <div class="panel-body">
                <div class="img-block">
                    <img src="{{ product.Image }}" width="100%"/>
                </div>
            </div>
            <div class="panel-footer">
                <div class="container">
                    <div class="label label-default">Price: {{ product.Price }}</div>
                    <form method="POST">
                        {{ form.hidden_tag() }}

                        <button type="submit" class="btn btn-success" id="buy-now">Add To Cart</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
